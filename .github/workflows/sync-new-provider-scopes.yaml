name: Sync New Provider Scopes

on:
    push:
        branches:
            - master
        paths:
            - 'packages/providers/providers.yaml'

jobs:
    sync-scopes:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  cache: 'npm'
                  node-version-file: '.nvmrc'

            - run: npm ci

            - name: Sync scopes for new/changed providers
              run: npm run update:providers:scopes:new -- --base=${{ github.event.before }}
              env:
                  OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

            - name: Create pull request
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  branch: chore/new-provider-scopes-${{ github.sha }}
                  commit-message: 'chore(providers): sync OAuth2 scopes for new provider'
                  title: 'chore(providers): sync OAuth2 scopes for new provider'
                  body: |
                      Automated OAuth2 scope sync for provider(s) added in ${{ github.sha }}.

                      Generated by the [Sync New Provider Scopes](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
                  labels: providers
