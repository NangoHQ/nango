name: Sync Provider Scopes

on:
    schedule:
        # Run on the 1st of every month at midnight UTC
        - cron: '0 0 1 * *'
    workflow_dispatch:

jobs:
    sync-scopes:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  cache: 'npm'
                  node-version-file: '.nvmrc'

            - run: npm ci

            - name: Update provider scopes
              run: npm run update:providers:scopes:all
              env:
                  OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

            - name: Create pull request
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  branch: chore/monthly-scopes-sync
                  commit-message: 'chore(providers): monthly OAuth2 scopes sync'
                  title: 'chore(providers): monthly OAuth2 scopes sync'
                  body: |
                      Automated monthly sync of OAuth2 provider scopes.

                      Generated by the [Sync Provider Scopes](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
                  labels: providers
