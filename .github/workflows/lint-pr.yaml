name: 'Lint PR'

on:
    pull_request:
        types:
            - opened
            - edited
            - synchronize
    merge_group:

permissions:
    pull-requests: read

jobs:
    lint-pr:
        name: Validate PR title
        if: ${{ github.event_name != 'merge_group' }}
        runs-on: blacksmith-2vcpu-ubuntu-2404
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
