name: Auto-Approve Docs PRs
on:
    pull_request:
        types: [opened, synchronize, reopened]
        paths:
            - 'docs/**'
permissions:
    contents: read
    pull-requests: write
jobs:
    auto-approve:
        runs-on: ubuntu-latest
        # Only run for trusted authors, blocks external contributors
        if: >-
            contains(fromJSON('["OWNER","MEMBER","COLLABORATOR","CONTRIBUTOR"]'),
            github.event.pull_request.author_association)
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Check changed paths
              uses: dorny/paths-filter@v4
              id: filter
              with:
                  predicate-quantifier: 'every'
                  filters: |
                      non_docs:
                          - '**'
                          - '!docs/**'

            - name: Generate GitHub App token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.GH_APP_PUSHER_ID }}
                  private-key: ${{ secrets.GH_APP_PUSHER_PRIVATE_KEY }}

            - name: Approve PR
              if: steps.filter.outputs.non_docs == 'false'
              uses: hmarr/auto-approve-action@v4
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  review-message: |
                      ✅ Auto-approved: docs-only change.
