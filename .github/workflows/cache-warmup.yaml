name: Cache Warmup

on:
    push:
        branches:
            - master

concurrency:
    group: cache-warmup
    cancel-in-progress: true

jobs:
    warm-npm-cache:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup-node

            - run: npm ci
