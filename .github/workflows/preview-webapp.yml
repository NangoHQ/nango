name: Preview Deploy — Webapp

on:
    pull_request:
        types: [opened, synchronize, reopened]

concurrency:
    group: preview-webapp-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    preview:
        runs-on: ubuntu-latest
        environment: development
        permissions:
            id-token: write
            contents: read
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set preview vars
              id: preview
              run: |
                  echo "slug=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
                  echo "url=https://pr-${{ github.event.pull_request.number }}.app-development.nango.dev" >> "$GITHUB_OUTPUT"
                  echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

            - name: Find or create deploying comment
              id: post-comment
              uses: actions/github-script@v7
              env:
                  PREVIEW_URL: ${{ steps.preview.outputs.url }}
                  RUN_URL: ${{ steps.preview.outputs.run_url }}
              with:
                  result-encoding: string
                  script: |
                      const { PREVIEW_URL: url, RUN_URL: runUrl } = process.env;
                      const now = new Date().toUTCString();
                      const marker = '<!-- preview-webapp-deploy-bot -->';
                      const body = `${marker}\n## Preview Deploy\n\n| Status | URL | Deploy Logs | Last Updated |\n|--------|-----|------------|-------------|\n| 🔄 Deploying | ${url} | [Deploy Logs](${runUrl}) | ${now} |`;

                      const comments = await github.paginate(github.rest.issues.listComments, {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });
                      const existing = comments.find(c => c.body.startsWith(marker));

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                        return String(existing.id);
                      }

                      const { data: comment } = await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body,
                      });
                      return String(comment.id);

            - name: Install dependencies
              run: npm ci

            - name: Build Webapp
              run: npm run ts-build && npm run -w @nangohq/webapp build

            - name: Replace env.js source with api path in dist/index.html
              run: |
                  FILE="packages/webapp/dist/index.html"
                  sed -E -i 's#(src=")/env\.js\?hash=([^"]+)#\1${{ vars.API_DOMAIN }}/env.js?hash=\2#g' "$FILE"

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ vars.PREVIEW_APP_UI_ROLE }}
                  role-session-name: GitHub_to_AWS_via_FederatedOIDC
                  aws-region: ${{ vars.AWS_REGION }}

            - name: Deploy to S3
              run: |
                  aws s3 sync --delete packages/webapp/dist/ s3://${{ vars.PREVIEW_APP_UI_BUCKET }}/previews/${{ steps.preview.outputs.slug }}/

            - name: Create CloudFront invalidation
              run: |
                  aws cloudfront create-invalidation --distribution-id ${{ vars.PREVIEW_APP_UI_DISTRIBUTION_ID }} --paths "/previews/${{ steps.preview.outputs.slug }}/*"

            - name: Update comment - Ready
              if: success()
              uses: actions/github-script@v7
              env:
                  PREVIEW_URL: ${{ steps.preview.outputs.url }}
                  RUN_URL: ${{ steps.preview.outputs.run_url }}
              with:
                  script: |
                      const { PREVIEW_URL: url, RUN_URL: runUrl } = process.env;
                      const now = new Date().toUTCString();
                      const body = `<!-- preview-webapp-deploy-bot -->\n## Preview Deploy\n\n| Status | URL | Deploy Logs | Last Updated |\n|--------|-----|------------|-------------|\n| ✅ Ready | [${url}](${url}) | [Deploy Logs](${runUrl}) | ${now} |`;
                      await github.rest.issues.updateComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        comment_id: Number('${{ steps.post-comment.outputs.result }}'),
                        body,
                      });

            - name: Update comment - Failed
              if: failure() && steps.post-comment.outputs.result != ''
              uses: actions/github-script@v7
              env:
                  PREVIEW_URL: ${{ steps.preview.outputs.url }}
                  RUN_URL: ${{ steps.preview.outputs.run_url }}
              with:
                  script: |
                      const { PREVIEW_URL: url, RUN_URL: runUrl } = process.env;
                      const now = new Date().toUTCString();
                      const body = `<!-- preview-webapp-deploy-bot -->\n## Preview Deploy\n\n| Status | URL | Deploy Logs | Last Updated |\n|--------|-----|------------|-------------|\n| ❌ Failed | ${url} | [Deploy Logs](${runUrl}) | ${now} |`;
                      await github.rest.issues.updateComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        comment_id: Number('${{ steps.post-comment.outputs.result }}'),
                        body,
                      });
