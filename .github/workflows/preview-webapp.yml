name: Preview Deploy — Webapp

on:
    pull_request:
        types: [opened, synchronize, reopened]
        paths:
            - 'packages/webapp/**'
            - 'packages/design-system/**'

permissions: {}

concurrency:
    group: preview-webapp-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    preview:
        runs-on: ubuntu-latest
        environment: development
        # if guard and comment steps removed, aws-region hardcoded to validate OIDC fails for fork PRs
        permissions:
            id-token: write
            contents: read
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  persist-credentials: false

            - name: Set preview vars
              id: preview
              run: |
                  echo "slug=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
              with:
                  role-to-assume: ${{ vars.PREVIEW_APP_UI_ROLE }}
                  role-session-name: GitHub_to_AWS_via_FederatedOIDC
                  aws-region: us-east-1
