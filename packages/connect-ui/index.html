<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <script>
            // Assets are relative to the document URL, so a slashless base URL ("…/nango/connect")
            // breaks them. Wired to `onerror` on the entry script: retry with a trailing slash.
            window.__nangoBasePathRetry = function () {
                var path = location.pathname;
                if (!path.endsWith('/')) {
                    location.replace(path + '/' + location.search + location.hash);
                }
            };
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nango Connect</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    </head>

    <body>
        <div id="root"></div>
        <script type="module" onerror="__nangoBasePathRetry()" src="/src/main.tsx"></script>
    </body>
</html>
