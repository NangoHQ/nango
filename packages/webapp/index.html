<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Get OAuth tokens for APIs. Fast & secure." />
        <link rel="manifest" href="/manifest.json" />
        <title>Nango</title>

        <!-- Apply saved theme before first paint to avoid flash -->
        <script>
            (function () {
                try {
                    var s = localStorage.getItem('theme');
                    var dark = s ? JSON.parse(s)?.state?.darkMode : true;
                    if (dark !== false) {
                        document.documentElement.classList.add('dark');
                        document.documentElement.setAttribute('data-theme', 'dark');
                    }
                } catch (e) {
                    document.documentElement.classList.add('dark');
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            })();
        </script>

        <meta name="nango-api-origin" content="" />
        <meta name="nango-env-hash" content="%VITE_HASH%" />
    </head>

    <body class="bg-nav-gradient">
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script type="module" src="/src/index.tsx"></script>
    </body>
</html>
