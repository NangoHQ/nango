<!doctype html>
<html lang="en" class="dark bg-bg-elevated" data-theme="dark">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Get OAuth tokens for APIs. Fast & secure." />
        <link rel="manifest" href="/manifest.json" />
        <title>Nango</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Mono&display=swap"
            rel="stylesheet"
        />
        <script src="/env.js?hash=%VITE_HASH%"></script>
        <!-- Apply persisted theme before first paint to avoid flash of wrong theme -->
        <script>
            (function () {
                try {
                    var s = JSON.parse(localStorage.getItem('nango_theme') || '{}');
                    var dark = s.state && s.state.darkMode === false ? false : true;
                    document.documentElement.classList.toggle('dark', dark);
                    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
                } catch (e) {
                    // keep dark default already set on <html>
                }
            })();
        </script>
    </head>

    <body class="bg-nav-gradient">
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script type="module" src="/src/index.tsx"></script>
    </body>
</html>
